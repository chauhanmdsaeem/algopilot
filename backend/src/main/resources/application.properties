# Spring Boot Application Name
spring.application.name=backend

spring.datasource.url=jdbc:mysql://localhost:3306/algopilot_db
spring.datasource.username=root
# Secured using environment variable with fallback
spring.datasource.password=${DB_PASSWORD:saeem0011}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
server.port=8080

# JPA and Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT configuration
# Secured using environment variable with fallback
jwt.secret=${JWT_SECRET:algopilot-secret-key-2026-very-long-string-should-be-kept-private}
jwt.expiration=86400000